name: CI
on: [push, pull_request]
jobs:
 test:
  runs-on: ubuntu-latest
  steps:
   - uses: actions/checkout@v4
   - uses: actions/setup-python@v5
     with: {python-version: '3.11'}
   - run: python -m unittest discover -s tests -v
   - run: python -m compileall -q app
   - run: sudo apt-get update && sudo apt-get install -y shellcheck && shellcheck scripts/*.sh radioctl
   - run: bash tests/test_install_service.sh
   - run: bash scripts/install.sh --dry-run --non-interactive || test $? -eq 1
